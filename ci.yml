name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-macos:
    name: Build (macOS arm64)
    runs-on: macos-14        # macos-14 is the arm64 runner

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install sqlcipher

      - name: Build
        run: make

      - name: Verify binary
        run: |
          file ./fynab
          ./fynab --help 2>&1 || true   # exits non-zero since --help isn't a flag; just verify it runs

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: fynab-macos-arm64
          path: fynab
          retention-days: 7

  build-macos-intel:
    name: Build (macOS x86_64)
    runs-on: macos-13        # macos-13 is the Intel runner

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install sqlcipher

      - name: Build
        run: make BREW_PREFIX=/usr/local

      - name: Verify binary
        run: |
          file ./fynab
          ./fynab --help 2>&1 || true

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: fynab-macos-intel
          path: fynab
          retention-days: 7
